<!DOCTYPE html>
<!-- Site root must be index.html (all lowercase) for GitHub Pages. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Basic Sciences Quarterly — current issue, publications, and faculty metrics.">
  <title>Basic Sciences Quarterly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ucd-blue: #002855;
      --ucd-gold: #DAAA00;
      --ucd-light: #1B5299;
      --text: #30373D;
      --muted: #666059;
      --bg: #F7F5F2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .wrap { max-width: 640px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
    header {
      border-top: 4px solid var(--ucd-blue);
      padding-top: 2rem;
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--ucd-blue);
      margin-bottom: 0.5rem;
    }
    header p { font-size: 0.95rem; color: var(--muted); }
    ul { list-style: none; }
    li + li { margin-top: 0.75rem; }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #fff;
      border: 1px solid #DDD8D2;
      border-radius: 8px;
      padding: 1.1rem 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: box-shadow 0.2s, border-color 0.2s;
    }
    a.card:hover {
      border-color: var(--ucd-light);
      box-shadow: 0 6px 20px rgba(0,40,85,0.08);
    }
    a.card strong {
      display: block;
      font-size: 1rem;
      color: var(--ucd-blue);
      margin-bottom: 0.25rem;
    }
    a.card span { font-size: 0.85rem; color: var(--muted); }
    a.card::after {
      content: "→";
      float: right;
      color: var(--ucd-gold);
      font-weight: 600;
      margin-top: 0.15rem;
    }
    h2.quarter {
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 1.1rem;
      color: var(--ucd-blue);
      margin: 2rem 0 0.75rem;
    }
    h2.quarter:first-of-type { margin-top: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Basic Sciences Quarterly</h1>
      <p>Newsletter, publications, and faculty metrics — each quarter keeps its own stable URL.</p>
    </header>

    <nav aria-label="Site pages">
      <h2 class="quarter">Q2 2026 (current issue)</h2>
      <ul>
        <li>
          <a class="card" href="2026-q2/newsletter.html">
            <strong>Newsletter</strong>
            <span>Quarterly edition</span>
          </a>
        </li>
        <li>
          <a class="card" href="2026-q2/faculty-metrics.html">
            <strong>Faculty publication metrics</strong>
            <span>Faculty list and metrics</span>
          </a>
        </li>
        <li>
          <a class="card" href="2026-q2/publications.html">
            <strong>Faculty publications</strong>
            <span>Publication listing</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</body>
</html>
